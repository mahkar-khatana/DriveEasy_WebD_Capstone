<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveEasy — My Bookings</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/common.css">
<link rel="stylesheet" href="css/history.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="nav">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg>
    </div>
    Drive<span>Easy</span>
  </div>
  <div class="nav-tabs">
    <a class="nav-tab" href="dashboard.html">Dashboard</a>
    <a class="nav-tab" href="booking.html">Book a Car</a>
    <a class="nav-tab active" href="history.html">My Bookings</a>
  </div>
  <div class="nav-right">
    <div class="nav-badge" id="navBadge">0 Bookings</div>
  </div>
</nav>

<!-- HISTORY VIEW -->
<div class="history-wrap">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
    <h2 style="font-size:22px">My Bookings</h2>
    <button onclick="clearHistory()" style="padding:7px 16px;border-radius:var(--radius-sm);border:1px solid rgba(255,77,109,0.3);background:rgba(255,77,109,0.07);color:var(--red);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif">Clear All</button>
  </div>
  <div class="hist-filters">
    <button class="filter-btn active" onclick="filterHist('all',this)">All</button>
    <button class="filter-btn" onclick="filterHist('Hyundai Creta',this)">Hyundai Creta</button>
    <button class="filter-btn" onclick="filterHist('Toyota Fortuner',this)">Toyota Fortuner</button>
    <button class="filter-btn" onclick="filterHist('Maruti Swift',this)">Maruti Swift</button>
    <button class="filter-btn" onclick="filterHist('Mahindra Thar',this)">Mahindra Thar</button>
  </div>
  <div class="hist-cards" id="histCards"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-icon ok" id="toastIcon">✓</div>
  <span id="toastMsg"></span>
</div>

<script src="js/data.js"></script>
<script src="js/common.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/history.js"></script>
<script>
  renderHistory();
  updateNavBadge();
</script>
</body>
</html>
